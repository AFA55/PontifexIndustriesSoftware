<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pontifex — Launch Animation (Purple→Red)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:#0a0614;color:#fff;display:grid;place-items:center;min-height:100%}
  .hint{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#a08fb0;font-size:13px;text-align:center;width:92%}

  .phone{position:relative;width:300px;height:620px;border-radius:46px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.6),inset 0 0 0 10px #1a1320,inset 0 0 0 12px #2e2440;background:#000}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#000;border-radius:0 0 16px 16px;z-index:9}
  .stage{position:absolute;inset:0;background:#160a24;overflow:hidden;display:grid;place-items:center}

  /* aurora — purple / magenta / red */
  .blob{position:absolute;border-radius:50%;filter:blur(48px);opacity:.55;mix-blend-mode:screen;will-change:transform}
  .b1{width:260px;height:260px;background:#7C3AED;top:-50px;left:-50px;animation:f1 10s ease-in-out infinite}
  .b2{width:240px;height:240px;background:#A21CAF;top:130px;left:80px;animation:f2 12s ease-in-out infinite}
  .b3{width:240px;height:240px;background:#EF4444;bottom:-40px;right:-40px;opacity:.5;animation:f3 11s ease-in-out infinite}
  .b4{width:170px;height:170px;background:#DB2777;top:40px;right:-20px;opacity:.35;animation:f4 14s ease-in-out infinite}
  @keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(28px,38px) scale(1.15)}}
  @keyframes f2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-22px,28px) scale(1.1)}}
  @keyframes f3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-28px,-28px) scale(1.18)}}
  @keyframes f4{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-18px,36px) scale(1.2)}}

  /* tech blueprint grid (warm-tinted), masked to fade at edges */
  .grid{position:absolute;inset:0;opacity:0;
    background-image:linear-gradient(rgba(244,114,182,.10) 1px,transparent 1px),linear-gradient(90deg,rgba(244,114,182,.10) 1px,transparent 1px);
    background-size:24px 24px;
    -webkit-mask:radial-gradient(circle at 50% 42%,#000 0%,transparent 70%);
            mask:radial-gradient(circle at 50% 42%,#000 0%,transparent 70%)}
  .grain{position:absolute;inset:0;opacity:.06;mix-blend-mode:overlay;pointer-events:none}

  .lockup{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:22px;transform:translateY(20px)}
  .markwrap{position:relative;width:120px;height:120px;display:grid;place-items:center}
  .markwrap::before{content:"";position:absolute;width:128px;height:128px;border-radius:50%;
    background:radial-gradient(circle,rgba(168,28,175,.5),rgba(239,68,68,.24) 48%,transparent 72%);
    filter:blur(13px);opacity:0;transform:scale(.6);will-change:opacity,transform}
  .mark{width:112px;height:112px;position:relative;z-index:2;overflow:visible}
  .bridge{fill:none;stroke:url(#journey);stroke-width:18;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1;stroke-dashoffset:1}
  .energize{fill:none;stroke:#FECDD3;stroke-width:18;stroke-linecap:round;stroke-linejoin:round;opacity:0}
  .node{opacity:0;transform-box:fill-box;transform-origin:center}
  .pulse{opacity:0}

  .word{text-align:center}
  .pontifex{font-weight:700;font-size:31px;letter-spacing:-.01em;opacity:0;filter:blur(10px);transform:translateY(14px);
    background:linear-gradient(100deg,#fff,#FBCFE8 60%,#fff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .industries{margin-top:9px;font-weight:600;font-size:11px;letter-spacing:.46em;text-transform:uppercase;opacity:0;filter:blur(8px);transform:translateY(10px);
    background:linear-gradient(90deg,#9333EA,#DB2777 55%,#EF4444);-webkit-background-clip:text;background-clip:text;color:transparent}

  /* ---- timeline ---- */
  .play .grid{animation:gridIn 1.4s ease .3s forwards}
  .play .bridge{animation:draw 1.05s cubic-bezier(.6,0,.2,1) .2s forwards}
  .play .markwrap::before{animation:bloom 1.1s ease .9s forwards}
  .play .lockup{animation:settle 1s cubic-bezier(.2,.8,.2,1) .75s forwards}
  .play .energize{animation:flash .5s ease 2.25s 1}
  .play .pontifex{animation:rise .7s cubic-bezier(.2,.8,.2,1) 1.5s forwards}
  .play .industries{animation:rise .7s cubic-bezier(.2,.8,.2,1) 1.75s forwards}
  .play #n1{animation:nodePop .5s ease 1.35s forwards}
  .play #n2{animation:nodePop .5s ease 1.75s forwards}
  .play #n3{animation:nodePop .5s ease 2.15s forwards}

  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes gridIn{to{opacity:.55}}
  @keyframes bloom{0%{opacity:0;transform:scale(.6)}55%{opacity:1;transform:scale(1.12)}100%{opacity:.78;transform:scale(1)}}
  @keyframes settle{to{transform:translateY(0)}}
  @keyframes flash{0%{opacity:0}40%{opacity:.85}100%{opacity:0}}
  @keyframes rise{to{opacity:1;filter:blur(0);transform:translateY(0)}}
  @keyframes nodePop{0%{opacity:0;transform:scale(0)}60%{opacity:1;transform:scale(1.6)}100%{opacity:.95;transform:scale(1)}}
</style>
</head>
<body>
  <div class="hint">Pontifex launch &mdash; the bridge builds, then a <b>data pulse</b> crosses it lighting the nodes: technology carrying you across.</div>

  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="journey" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#7C3AED"/><stop offset=".5" stop-color="#DB2777"/><stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <filter id="warmGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs></svg>

  <div class="phone">
    <div class="notch"></div>
    <div class="stage play" id="stage">
      <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div>
      <div class="grid"></div>
      <svg class="grain"><rect width="100%" height="100%" filter="url(#noise)"/></svg>

      <div class="lockup">
        <div class="markwrap">
          <svg class="mark" viewBox="0 0 200 200" aria-label="Pontifex">
            <path id="bp" class="bridge" transform="translate(-5,-2)" pathLength="1"
                  d="M70,160 L70,44 L108,44 A32 32 0 0 1 108,108 L70,108"/>
            <path class="energize" transform="translate(-5,-2)"
                  d="M70,160 L70,44 L108,44 A32 32 0 0 1 108,108 L70,108"/>
            <g transform="translate(-5,-2)" filter="url(#warmGlow)">
              <circle id="n1" class="node" cx="70"  cy="160" r="6.5" fill="#FCA5A5"/>
              <circle id="n2" class="node" cx="70"  cy="44"  r="6"   fill="#F5D0FE"/>
              <circle id="n3" class="node" cx="135" cy="76"  r="6.5" fill="#FBCFE8"/>
            </g>
            <g transform="translate(-5,-2)">
              <circle class="pulse" r="5.5" fill="#FFFFFF" filter="url(#warmGlow)">
                <animate attributeName="opacity" begin="1.3s" dur="1s" values="0;1;1;0" keyTimes="0;0.12;0.82;1" fill="freeze"/>
                <animateMotion begin="1.3s" dur="1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.5 0 0.3 1">
                  <mpath href="#bp"/>
                </animateMotion>
              </circle>
            </g>
          </svg>
        </div>
        <div class="word">
          <div class="pontifex">Pontifex</div>
          <div class="industries">Industries</div>
        </div>
      </div>
    </div>
  </div>

  <div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:12px">
    <button id="replay" style="font:600 13px/1 inherit;color:#fff;background:linear-gradient(135deg,#7C3AED,#DB2777,#EF4444);border:0;padding:11px 22px;border-radius:999px;cursor:pointer;box-shadow:0 8px 24px rgba(219,39,119,.45)">&#8635; Replay</button>
    <button id="loop" style="font:600 13px/1 inherit;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:11px 18px;border-radius:999px;cursor:pointer">Loop: Off</button>
  </div>

<script>
  const stage=document.getElementById('stage'),replay=document.getElementById('replay'),loopBtn=document.getElementById('loop');
  let looping=false,timer=null;
  function play(){
    stage.classList.remove('play');void stage.offsetWidth;stage.classList.add('play');
    document.querySelectorAll('animate,animateMotion').forEach(a=>a.beginElement&&a.beginElement());
    if(looping){clearTimeout(timer);timer=setTimeout(play,3800);}
  }
  replay.onclick=play;
  loopBtn.onclick=()=>{looping=!looping;loopBtn.textContent='Loop: '+(looping?'On':'Off');looping?play():clearTimeout(timer);};
</script>
</body>
</html>
