<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pontifex — Launch Animation Preview</title>
<style>
  :root{ --indigo:#1e1b4b; --violet:#7c3aed; --violet-l:#A78BFA; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background:#0b0a1f; color:#fff; display:grid; place-items:center; min-height:100%;
  }
  /* phone frame so it feels like the app launching */
  .phone{
    position:relative; width:300px; height:620px; border-radius:46px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 0 0 10px #15131f, inset 0 0 0 12px #2a2740;
    background:#000;
  }
  .stage{
    position:absolute; inset:0;
    background:radial-gradient(circle at 50% 40%, #2a2566 0%, var(--indigo) 58%, #171444 100%);
    display:grid; place-items:center; overflow:hidden;
  }
  /* notch */
  .notch{position:absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:26px; background:#000; border-radius:0 0 16px 16px; z-index:5}

  .lockup{ display:flex; flex-direction:column; align-items:center; gap:20px; transform:translateY(26px); }
  .mark{ width:104px; height:104px; opacity:0; will-change:transform,opacity }
  .mark svg{ width:100%; height:100%; filter:drop-shadow(0 10px 28px rgba(124,58,237,.5)) }
  .word{ text-align:center; overflow:hidden }
  .pontifex{ font-weight:700; font-size:30px; letter-spacing:-.01em; color:#fff; opacity:0; will-change:transform,opacity }
  .industries{ margin-top:8px; font-weight:500; font-size:11.5px; letter-spacing:.42em; text-transform:uppercase; color:var(--violet-l); opacity:0; will-change:transform,opacity }

  /* ---- animations: run when .play is on the stage; fill forwards so it STAYS ---- */
  .play .lockup{ animation:settleUp 1s cubic-bezier(.2,.8,.2,1) .55s forwards; }
  .play .mark{ animation:markIn 1s cubic-bezier(.2,.85,.25,1) forwards; }
  .play .pontifex{ animation:riseIn .65s ease-out .7s forwards; }
  .play .industries{ animation:riseIn .65s ease-out 1.0s forwards; }

  @keyframes markIn{
    0%{ opacity:0; transform:translateY(26px) scale(.62) }
    55%{ opacity:1 }
    70%{ transform:translateY(0) scale(1.06) }
    100%{ opacity:1; transform:translateY(0) scale(1) }
  }
  @keyframes settleUp{ to{ transform:translateY(0) } }
  @keyframes riseIn{ 0%{opacity:0; transform:translateY(16px)} 100%{opacity:1; transform:translateY(0)} }

  .controls{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%); display:flex; gap:12px; align-items:center }
  button{
    font:600 13px/1 inherit; color:#fff; background:linear-gradient(135deg,#4F46E5,#7C3AED);
    border:0; padding:11px 20px; border-radius:999px; cursor:pointer; box-shadow:0 8px 24px rgba(124,58,237,.4)
  }
  button.ghost{ background:rgba(255,255,255,.08); box-shadow:none; border:1px solid rgba(255,255,255,.18) }
  .hint{ position:fixed; top:26px; left:50%; transform:translateX(-50%); color:#8b88a8; font-size:13px; letter-spacing:.02em }
</style>
</head>
<body>
  <div class="hint">App launch preview &mdash; the &ldquo;P&rdquo; resolves into the wordmark, then holds.</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="stage play" id="stage">
      <div class="lockup">
        <div class="mark">
          <svg viewBox="0 0 200 200" aria-hidden="true">
            <defs>
              <linearGradient id="pm" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ffffff"/>
                <stop offset="1" stop-color="#C4B5FD"/>
              </linearGradient>
            </defs>
            <path fill="url(#pm)" fill-rule="evenodd" transform="translate(-5,-2)"
                  d="M58,164 L58,38 L118,38 A37 37 0 0 1 118,112 L86,112 L86,164 Z
                     M88,98 L88,76 A15 15 0 0 1 118,76 L118,98 Z"/>
          </svg>
        </div>
        <div class="word">
          <div class="pontifex">Pontifex</div>
          <div class="industries">Industries</div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="replay">&#8635; Replay</button>
    <button class="ghost" id="loop">Loop: Off</button>
  </div>

<script>
  const stage = document.getElementById('stage');
  const replay = document.getElementById('replay');
  const loopBtn = document.getElementById('loop');
  let looping = false, timer = null;

  function play(){
    stage.classList.remove('play');
    void stage.offsetWidth;        // force reflow to restart CSS animations
    stage.classList.add('play');
    if (looping){ clearTimeout(timer); timer = setTimeout(play, 3600); }
  }
  replay.addEventListener('click', play);
  loopBtn.addEventListener('click', ()=>{
    looping = !looping;
    loopBtn.textContent = 'Loop: ' + (looping?'On':'Off');
    if (looping) play(); else clearTimeout(timer);
  });
</script>
</body>
</html>
