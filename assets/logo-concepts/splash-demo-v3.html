<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pontifex — Launch Animation (Final)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:#07061a;color:#fff;display:grid;place-items:center;min-height:100%}
  .hint{position:fixed;top:22px;left:50%;transform:translateX(-50%);color:#8b88a8;font-size:13px;text-align:center;width:90%}

  .phone{position:relative;width:300px;height:620px;border-radius:46px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.6),inset 0 0 0 10px #15131f,inset 0 0 0 12px #2a2740;background:#000}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#000;border-radius:0 0 16px 16px;z-index:9}

  /* base matches a native splash bg so there's no flash on real launch */
  .stage{position:absolute;inset:0;background:#0b0926;overflow:hidden;display:grid;place-items:center}

  /* ---- aurora mesh background: indigo / violet / cyan + a whisper of magenta ---- */
  .blob{position:absolute;border-radius:50%;filter:blur(48px);opacity:.55;mix-blend-mode:screen;will-change:transform}
  .b1{width:260px;height:260px;background:#4F46E5;top:-50px;left:-50px;animation:f1 10s ease-in-out infinite}
  .b2{width:240px;height:240px;background:#9333EA;top:130px;left:80px;animation:f2 12s ease-in-out infinite}
  .b3{width:240px;height:240px;background:#22D3EE;bottom:-40px;right:-40px;opacity:.45;animation:f3 11s ease-in-out infinite}
  .b4{width:160px;height:160px;background:#DB2777;top:40px;right:-20px;opacity:.28;animation:f4 14s ease-in-out infinite}
  @keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(28px,38px) scale(1.15)}}
  @keyframes f2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-22px,28px) scale(1.1)}}
  @keyframes f3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-28px,-28px) scale(1.18)}}
  @keyframes f4{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-18px,36px) scale(1.2)}}
  .grain{position:absolute;inset:0;opacity:.06;mix-blend-mode:overlay;pointer-events:none}

  .lockup{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:22px;transform:translateY(20px)}

  .markwrap{position:relative;width:120px;height:120px;display:grid;place-items:center}
  .markwrap::before{content:"";position:absolute;width:128px;height:128px;border-radius:50%;
    background:radial-gradient(circle,rgba(147,51,234,.55),rgba(34,211,238,.22) 48%,transparent 72%);
    filter:blur(13px);opacity:0;transform:scale(.6);will-change:opacity,transform}
  .mark{width:110px;height:110px;position:relative;z-index:2}
  .mark path{fill:none;stroke:url(#journey);stroke-width:18;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:1;stroke-dashoffset:1}

  .shimmer{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden}
  .shimmer::after{content:"";position:absolute;top:-20%;left:-60%;width:38%;height:140%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);transform:skewX(-18deg);opacity:0}

  .word{text-align:center}
  .pontifex{font-weight:700;font-size:31px;letter-spacing:-.01em;opacity:0;filter:blur(10px);transform:translateY(14px);
    background:linear-gradient(100deg,#fff,#E9D5FF 60%,#fff);-webkit-background-clip:text;background-clip:text;color:transparent;will-change:opacity,filter,transform}
  .industries{margin-top:9px;font-weight:600;font-size:11px;letter-spacing:.46em;text-transform:uppercase;opacity:0;filter:blur(8px);transform:translateY(10px);
    background:linear-gradient(90deg,#6366F1,#9333EA 55%,#22D3EE);-webkit-background-clip:text;background-clip:text;color:transparent;will-change:opacity,filter,transform}

  /* ---- timeline (fill forwards = holds) ---- */
  .play .mark path{animation:draw 1.05s cubic-bezier(.6,0,.2,1) .2s forwards}
  .play .markwrap::before{animation:bloom 1.1s ease .9s forwards}
  .play .lockup{animation:settle 1s cubic-bezier(.2,.8,.2,1) .75s forwards}
  .play .shimmer::after{animation:sweep 1s ease 1.25s 1}
  .play .pontifex{animation:rise .7s cubic-bezier(.2,.8,.2,1) 1.35s forwards}
  .play .industries{animation:rise .7s cubic-bezier(.2,.8,.2,1) 1.6s forwards}

  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes bloom{0%{opacity:0;transform:scale(.6)}55%{opacity:1;transform:scale(1.12)}100%{opacity:.78;transform:scale(1)}}
  @keyframes settle{to{transform:translateY(0)}}
  @keyframes sweep{0%{opacity:0;left:-60%}12%{opacity:1}100%{opacity:0;left:120%}}
  @keyframes rise{to{opacity:1;filter:blur(0);transform:translateY(0)}}
</style>
</head>
<body>
  <div class="hint">Pontifex launch &mdash; the bridge (&ldquo;P&rdquo;) <b>builds itself</b>, the journey color travels across it, then the name resolves.</div>

  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="journey" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#4F46E5"/><stop offset=".5" stop-color="#9333EA"/><stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs></svg>

  <div class="phone">
    <div class="notch"></div>
    <div class="stage play" id="stage">
      <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div>
      <svg class="grain"><rect width="100%" height="100%" filter="url(#noise)"/></svg>
      <div class="lockup">
        <div class="markwrap">
          <div class="shimmer"></div>
          <svg class="mark" viewBox="0 0 200 200" aria-label="Pontifex">
            <path transform="translate(-5,-2)" pathLength="1" d="M70,160 L70,44 L108,44 A32 32 0 0 1 108,108 L70,108"/>
          </svg>
        </div>
        <div class="word">
          <div class="pontifex">Pontifex</div>
          <div class="industries">Industries</div>
        </div>
      </div>
    </div>
  </div>

  <div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:12px">
    <button id="replay" style="font:600 13px/1 inherit;color:#fff;background:linear-gradient(135deg,#4F46E5,#9333EA,#22D3EE);border:0;padding:11px 22px;border-radius:999px;cursor:pointer;box-shadow:0 8px 24px rgba(147,51,234,.45)">&#8635; Replay</button>
    <button id="loop" style="font:600 13px/1 inherit;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:11px 18px;border-radius:999px;cursor:pointer">Loop: Off</button>
  </div>

<script>
  const stage=document.getElementById('stage'),replay=document.getElementById('replay'),loopBtn=document.getElementById('loop');
  let looping=false,timer=null;
  function play(){stage.classList.remove('play');void stage.offsetWidth;stage.classList.add('play');if(looping){clearTimeout(timer);timer=setTimeout(play,3400);}}
  replay.onclick=play;
  loopBtn.onclick=()=>{looping=!looping;loopBtn.textContent='Loop: '+(looping?'On':'Off');looping?play():clearTimeout(timer);};
</script>
</body>
</html>
