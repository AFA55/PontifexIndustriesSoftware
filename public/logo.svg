<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img">
  <title>Pontifex Industries</title>
  <desc>Pontifex "P" — a single continuous stroke: tower, bridge span, landing. The journey gradient travels across it.</desc>
  <defs>
    <linearGradient id="pontifexJourney" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#DB2777"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <g transform="translate(-5,-2)" fill="none" stroke="url(#pontifexJourney)"
     stroke-width="17" stroke-linecap="round" stroke-linejoin="round">
    <path d="M70,160 L70,44 L108,44 A32 32 0 0 1 108,108 L70,108"/>
  </g>
</svg>
